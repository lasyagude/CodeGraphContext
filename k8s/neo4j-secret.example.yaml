# Example secret for neo4j-deployment.yaml — do not commit real credentials.
# Create before applying the deployment:
#   kubectl create secret generic neo4j-auth --from-literal=auth='neo4j/YOUR_STRONG_PASSWORD'
apiVersion: v1
kind: Secret
metadata:
  name: neo4j-auth
type: Opaque
stringData:
  auth: neo4j/CHANGE_ME
